<!DOCTYPE html>
<html>

<head>
    <title>HandyCam Camera Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0 0 4px;
        }

        header p {
            margin: 0;
            font-size: 0.85rem;
            color: #666;
        }

        .card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #666;
            margin: 0 0 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-badge.active  { background: #f0faf3; border-color: #b0dfc0; color: #1a6e37; }
        .status-badge.active .dot  { background: #28a745; }
        .status-badge.inactive { background: #fdf3f3; border-color: #f0c0c0; color: #7a2020; }
        .status-badge.inactive .dot { background: #dc3545; }

        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 16px;
            font-size: 0.875rem;
        }

        .info-grid .key { color: #666; }
        .info-grid .val { font-weight: 500; }

        button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            margin: 6px 0;
            font-size: 0.9rem;
            font-family: inherit;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.15s, background 0.15s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:not(:disabled):hover { opacity: 0.88; }

        .btn-primary  { background: #1a73e8; color: white; }
        .btn-danger   { background: #dc3545; color: white; }
        .btn-secondary { background: white; color: #333; border-color: #ccc; }

        .toggle-btn {
            background: white;
            color: #333;
            border-color: #ccc;
        }
        .toggle-btn.active {
            background: #e8f0fe;
            border-color: #1a73e8;
            color: #1a73e8;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
            font-size: 0.875rem;
        }

        .control-row label {
            min-width: 120px;
            color: #444;
        }

        .control-row input[type="range"] {
            flex: 1;
            accent-color: #1a73e8;
        }

        .control-row .val-label {
            min-width: 36px;
            text-align: right;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .message {
            padding: 10px 14px;
            border-radius: 6px;
            margin: 8px 0;
            font-size: 0.875rem;
            display: none;
        }

        .message.success { background: #f0faf3; border: 1px solid #b0dfc0; color: #1a6e37; display: block; }
        .message.error   { background: #fdf3f3; border: 1px solid #f0c0c0; color: #7a2020; display: block; }

        .camera-btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .camera-btn-row button {
            flex: 1;
            min-width: 100px;
            margin: 0;
        }

        #torchNote {
            font-size: 0.8rem;
            color: #dc3545;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>HandyCam</h1>
            <p>Camera Control</p>
        </header>

        <div class="card">
            <div class="card-title">Status</div>
            <div id="status" class="status-badge inactive">
                <span class="dot"></span>
                <span id="statusText">Checking...</span>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="card" id="info" style="display:none;">
            <div class="card-title">Stream Info</div>
            <div class="info-grid">
                <span class="key">Port</span>       <span class="val" id="port">-</span>
                <span class="key">Camera</span>     <span class="val" id="camera">-</span>
                <span class="key">Resolution</span> <span class="val" id="resolution">-</span>
                <span class="key">FPS</span>        <span class="val" id="fps">-</span>
                <span class="key">JPEG Quality</span> <span class="val" id="jpegQuality">-</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Stream</div>
            <button class="btn-primary" onclick="startCamera()">Start Stream</button>
            <button class="btn-danger" onclick="stopCamera()">Stop Stream</button>
        </div>

        <div class="card" id="cameraList">
            <div class="card-title">Camera Selection</div>
            <div class="camera-btn-row" id="cameraButtons">Loading...</div>
        </div>

        <div class="card">
            <div class="card-title">FPS</div>
            <div class="control-row">
                <label>Frame rate</label>
                <input type="range" id="fpsSlider" min="15" max="60" value="30" oninput="setFps(this.value)">
                <span class="val-label"><span id="fpsValue">30</span></span>
            </div>
            <button class="btn-secondary" id="applyFpsBtn" onclick="applyFps()">Apply (restarts stream)</button>
        </div>

        <div class="card" id="jpegCard">
            <div class="card-title">JPEG Quality</div>
            <div class="control-row">
                <label>Quality</label>
                <input type="range" id="jpegSlider" min="50" max="100" value="85" oninput="setJpegQuality(this.value)">
                <span class="val-label"><span id="jpegValue">85</span>%</span>
            </div>
            <button class="btn-secondary" id="applyJpegBtn" onclick="applyJpeg()">Apply (restarts stream)</button>
        </div>

        <div class="card" id="avcGroup" style="display:none;">
            <div class="card-title">AVC Bitrate</div>
            <div class="control-row">
                <label>Bitrate (kbps)</label>
                <input type="range" id="avcSlider" min="256" max="8000" step="64" value="2000" oninput="setAvcBitrate(this.value)">
                <span class="val-label" id="avcValue">2000</span>
            </div>
            <button class="btn-secondary" id="applyAvcBtn" onclick="applyAvc()">Apply (restarts stream)</button>
        </div>

        <div class="card" id="exposureCard">
            <div class="card-title">Exposure</div>
            <div class="control-row">
                <label>Compensation</label>
                <input type="range" id="exposureSlider" min="-50" max="50" value="0" oninput="setExposure(this.value)">
                <span class="val-label"><span id="exposureValue">0</span></span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Controls</div>
            <button class="toggle-btn" id="torchBtn" onclick="toggleTorch()">Torch: OFF</button>
            <div id="torchNote">Torch only works while stream is active</div>
            <button class="toggle-btn" id="useAvcBtn" onclick="toggleUseAvc()">Codec: MJPEG</button>
            <button class="toggle-btn" id="autoExposureBtn" onclick="toggleAutoExposure()">Auto Exposure: ON</button>
        </div>

        <div class="card">
            <button class="btn-secondary" onclick="checkStatus(); checkCameraSettings();">Refresh</button>
        </div>
    </div>

    <script>
        let torchEnabled = false;
        let avcEnabled = false;
        let avcBitrate = 2000;

        function showMessage(text, isSuccess) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + (isSuccess ? 'success' : 'error');
            setTimeout(() => msg.className = 'message', 3000);
        }

        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                const badge = document.getElementById('status');
                const text = document.getElementById('statusText');
                if (data.streaming === true) {
                    text.textContent = 'Streaming on port ' + data.port;
                    badge.className = 'status-badge active';
                    try { document.getElementById('torchBtn').disabled = false; } catch (_) {}
                    try { document.getElementById('torchNote').style.display = 'none'; } catch (_) {}
                } else {
                    text.textContent = 'Not streaming';
                    badge.className = 'status-badge inactive';
                    try { document.getElementById('torchBtn').disabled = true; } catch (_) {}
                    try { document.getElementById('torchNote').style.display = 'block'; } catch (_) {}
                }
            } catch (e) {
                showMessage('Failed to check status: ' + e.message, false);
            }
        }
        async function checkCameraSettings() {
            try {
                const response = await fetch('/api/camera/status');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // Streaming state
                if (data.streaming) {
                    document.getElementById('info').style.display = 'block';
                } else {
                    document.getElementById('info').style.display = 'none';
                }

                // Text fields
                document.getElementById('port').textContent = data.port;
                document.getElementById('camera').textContent = data.camera;
                document.getElementById('resolution').textContent =
                    `${data.width}x${data.height}`;
                document.getElementById('fps').textContent = data.fps;
                document.getElementById('jpegQuality').textContent =
                    `${data.jpegQuality}%`;

                // Sliders
                document.getElementById('fpsSlider').value = data.fps;
                document.getElementById('fpsValue').textContent = data.fps;

                document.getElementById('jpegSlider').value = data.jpegQuality;
                document.getElementById('jpegValue').textContent = data.jpegQuality;

                // AVC support: show/hide JPEG vs AVC controls
                avcEnabled = data.useAvc === true;
                avcBitrate = data.avcBitrate || 2000;
                const jpegCard = document.getElementById('jpegCard');
                const avcGroup = document.getElementById('avcGroup');
                if (avcEnabled) {
                    jpegCard.style.display = 'none';
                } else {
                    jpegCard.style.display = '';
                }

                document.getElementById('exposureSlider').value = data.exposure;
                document.getElementById('exposureValue').textContent = data.exposure;

                // auto exposure visibility
                const autoExposureEnabledLocal = data.autoExposure === true;
                // When auto-exposure is enabled, hide manual exposure slider
                if (autoExposureEnabledLocal) {
                    document.getElementById('exposureCard').style.display = 'none';
                    document.getElementById('autoExposureBtn').textContent = 'Auto Exposure: ON';
                    document.getElementById('autoExposureBtn').classList.add('active');
                } else {
                    document.getElementById('exposureCard').style.display = '';
                    document.getElementById('autoExposureBtn').textContent = 'Auto Exposure: OFF';
                    document.getElementById('autoExposureBtn').classList.remove('active');
                }

                // remember auto flags for UI
                window.autoExposureEnabled = autoExposureEnabledLocal;

                // Toggles
                torchEnabled = data.torchEnabled === true;
                updateToggleButtons();
                updateAvcButton();

            } catch (e) {
                console.error('Failed to check camera settings:', e);
                showMessage('Failed to load camera settings', false);
            }
        }

        function updateToggleButtons() {
            const torchBtn = document.getElementById('torchBtn');
            const autoExposureBtn = document.getElementById('autoExposureBtn');
            const useAvcBtn = document.getElementById('useAvcBtn');

            if (torchEnabled) {
                torchBtn.textContent = 'Torch: ON';
                torchBtn.classList.add('active');
            } else {
                torchBtn.textContent = 'Torch: OFF';
                torchBtn.classList.remove('active');
            }
            if (useAvcBtn) {
                if (avcEnabled) {
                    useAvcBtn.textContent = 'Codec: H.264 (AVC)';
                    useAvcBtn.classList.add('active');
                } else {
                    useAvcBtn.textContent = 'Codec: MJPEG';
                    useAvcBtn.classList.remove('active');
                }
            }
        }

        function updateAvcButton() {
            const useAvcBtn = document.getElementById('useAvcBtn');
            if (!useAvcBtn) return;
            if (avcEnabled) {
                useAvcBtn.textContent = 'Codec: H.264 (AVC)';
                useAvcBtn.classList.add('active');
            } else {
                useAvcBtn.textContent = 'Codec: MJPEG';
                useAvcBtn.classList.remove('active');
            }
        }

        async function startCamera() {
            try {
                const response = await fetch('/api/camera/start', { method: 'POST' });
                const data = await response.json();
                showMessage(data.message, data.success);
                if (data.success) setTimeout(checkStatus, 1000);
            } catch (e) {
                showMessage('Failed to start camera: ' + e.message, false);
            }
        }

        async function stopCamera() {
            try {
                const response = await fetch('/api/camera/stop', { method: 'POST' });
                const data = await response.json();
                showMessage(data.message, data.success);
                if (data.success) setTimeout(checkStatus, 1000);
            } catch (e) {
                showMessage('Failed to stop camera: ' + e.message, false);
            }
        }

        async function switchCamera(camera) {
            try {
                const response = await fetch('/api/camera/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ camera })
                });
                const data = await response.json();
                showMessage(data.message, data.success);
                if (data.success) setTimeout(checkStatus, 500);
            } catch (e) {
                showMessage('Failed to switch camera: ' + e.message, false);
            }
        }

        async function setFps(fps) {
            document.getElementById('fpsValue').textContent = fps;
            try {
                const response = await fetch('/api/settings/fps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fps: parseInt(fps) })
                });
                const data = await response.json();
                if (!data.success) showMessage(data.message, false);
            } catch (e) {
                showMessage('Failed to set FPS: ' + e.message, false);
            }
        }

        async function setJpegQuality(quality) {
            document.getElementById('jpegValue').textContent = quality;
            try {
                const response = await fetch('/api/settings/jpeg-quality', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quality: parseInt(quality) })
                });
                const data = await response.json();
                if (!data.success) showMessage(data.message, false);
            } catch (e) {
                showMessage('Failed to set JPEG quality: ' + e.message, false);
            }
        }

        async function applyFps() {
            const btn = document.getElementById('applyFpsBtn');
            btn.disabled = true;
            const fps = parseInt(document.getElementById('fpsSlider').value);
            try {
                // ensure setting saved
                await fetch('/api/settings/fps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fps })
                });
            } catch (e) {
                showMessage('Failed to save FPS: ' + e.message, false);
                btn.disabled = false; return;
            }

            try {
                let resp = await fetch('/api/camera/stop', { method: 'POST' });
                let data = await resp.json();
                if (!data.success) {
                    showMessage('Failed to stop stream: ' + data.message, false);
                    btn.disabled = false; return;
                }

                resp = await fetch('/api/camera/start', { method: 'POST' });
                data = await resp.json();
                showMessage(data.message, data.success);
                if (data.success) setTimeout(checkStatus, 1000);
            } catch (e) {
                showMessage('Failed to restart stream: ' + e.message, false);
            } finally {
                btn.disabled = false;
            }
        }

        async function applyJpeg() {
            const btn = document.getElementById('applyJpegBtn');
            btn.disabled = true;
            const quality = parseInt(document.getElementById('jpegSlider').value);
            try {
                await fetch('/api/settings/jpeg-quality', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quality })
                });
            } catch (e) {
                showMessage('Failed to save JPEG quality: ' + e.message, false);
                btn.disabled = false; return;
            }

            try {
                let resp = await fetch('/api/camera/stop', { method: 'POST' });
                let data = await resp.json();
                if (!data.success) {
                    showMessage('Failed to stop stream: ' + data.message, false);
                    btn.disabled = false; return;
                }

                resp = await fetch('/api/camera/start', { method: 'POST' });
                data = await resp.json();
                showMessage(data.message, data.success);
                if (data.success) setTimeout(checkStatus, 1000);
            } catch (e) {
                showMessage('Failed to restart stream: ' + e.message, false);
            } finally {
                btn.disabled = false;
            }
        }

        async function setExposure(exposure) {
            document.getElementById('exposureValue').textContent = exposure;
            try {
                const response = await fetch('/api/settings/exposure', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ exposure: parseInt(exposure) })
                });
                const data = await response.json();
                if (!data.success) showMessage(data.message, false);
            } catch (e) {
                showMessage('Failed to set exposure: ' + e.message, false);
            }
        }

        async function toggleTorch() {
            torchEnabled = !torchEnabled;
            try {
                const response = await fetch('/api/settings/torch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: torchEnabled })
                });
                const data = await response.json();
                if (data.success) {
                    updateToggleButtons();
                } else {
                    torchEnabled = !torchEnabled;
                    updateToggleButtons();
                    showMessage(data.message, false);
                }
            } catch (e) {
                torchEnabled = !torchEnabled;
                updateToggleButtons();
                showMessage('Failed to toggle torch: ' + e.message, false);
            }
        }

        async function toggleUseAvc() {
            avcEnabled = !avcEnabled;
            try {
                const response = await fetch('/api/settings/use-avc', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: avcEnabled })
                });
                const data = await response.json();
                if (!data.success) {
                    avcEnabled = !avcEnabled; updateAvcButton(); showMessage(data.message, false); return;
                }
                updateAvcButton();
            } catch (e) {
                avcEnabled = !avcEnabled; updateAvcButton(); showMessage('Failed to set AVC mode: ' + e.message, false);
            }
        }

        function setAvcBitrate(b) {
            avcBitrate = parseInt(b);
            document.getElementById('avcValue').textContent = avcBitrate;
        }

        async function applyAvc() {
            const btn = document.getElementById('applyAvcBtn');
            btn.disabled = true;
            try {
                await fetch('/api/settings/avc-bitrate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bitrate: avcBitrate })
                });
            } catch (e) {
                showMessage('Failed to save AVC bitrate: ' + e.message, false);
                btn.disabled = false; return;
            }

            try {
                let resp = await fetch('/api/camera/stop', { method: 'POST' });
                let data = await resp.json();
                if (!data.success) { showMessage('Failed to stop stream: ' + data.message, false); btn.disabled = false; return; }
                resp = await fetch('/api/camera/start', { method: 'POST' });
                data = await resp.json();
                showMessage(data.message, data.success);
                if (data.success) setTimeout(checkStatus, 1000);
            } catch (e) {
                showMessage('Failed to restart stream: ' + e.message, false);
            } finally { btn.disabled = false; }
        }

    

        async function loadCameraList() {
            try {
                const response = await fetch('/api/camera/list');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const list = await response.json();
                const container = document.getElementById('cameraButtons');
                container.innerHTML = '';
                list.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'toggle-btn';
                    btn.textContent = item.label || item.id;
                    btn.onclick = () => {
                        switchCamera(item.id);
                    };
                    container.appendChild(btn);
                });
            } catch (e) {
                console.error('Failed to load camera list', e);
                const container = document.getElementById('cameraButtons');
                container.textContent = 'Failed to load cameras';
            }
        }

        // Check status and camera settings on load
        checkStatus();
        checkCameraSettings();
        // Load camera list on load
        loadCameraList();
        // Auto-refresh: status + settings every 5 seconds
        setInterval(() => { checkStatus(); checkCameraSettings(); }, 5000);
        // Refresh camera list less frequently (every 15s)
        setInterval(loadCameraList, 15000);
    </script>
</body>

</html>
